events {
    worker_connections 1024;
}

http {
    upstream backend_servers {
        # 'backend' matches the service name in docker-compose.yml
        # Docker's internal DNS resolves this to all container IPs for that service
        server backend:3000;
    }

    server {
        listen 80;

        # Enable Gzip Compression for text responses
        gzip on;
        gzip_types text/plain application/json;

        location / {
            proxy_pass http://backend_servers;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            # The analysis pipeline's 6-minute-per-call agent timeout (with retries) and
            # the SSE progress stream (GET /api/analysis/:id/stream, kept open for the
            # life of a run) both outlast nginx's 60s default read timeout — bump it.
            proxy_read_timeout 360s;
        }

        # SSE progress stream: must not be buffered, or events sit in nginx's buffer
        # instead of reaching the browser as they're published.
        location ~ ^/api/analysis/.+/stream$ {
            proxy_pass http://backend_servers;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 360s;
            proxy_buffering off;
            proxy_cache off;
        }
    }
}
