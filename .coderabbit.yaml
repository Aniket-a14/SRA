# CodeRabbit Configuration
# Documentation: https://docs.coderabbit.ai/getting-started/configure-coderabbit

version: 1

rules:
  - id: sra-monorepo-context
    description: "Provide architectural context and standards for the SRA monorepo."
    glob: "**/*"
    instructions: |
      This is the SRA (Smart Requirements Analyzer) enterprise monorepo:
      - /frontend: Next.js 16 UI using App Router and Standalone compilation.
      - /backend: Node.js 20, Express, and Prisma 7 ORM.
      - /cli: Command-line audit toolkit (@sra-srs/sra-cli).
      - /model: Offline dataset harvesting/benchmarking and fine-tuning scripts for the
        planned self-hosted model stack (see v5.0_roadmap.md) — not part of the runtime app.

      Engineering & Code Review Standards:
      1. ESM Compliance: The backend uses ES Modules (`"type": "module"`). In unit tests, verify mock orchestrations use `jest.unstable_mockModule` dynamically. Never allow raw static mock imports that violate read-only ESM bindings.
      2. Database Connectivity:
         - App queries must use the transaction-pooled `DATABASE_URL` (typically port 6543).
         - Migrations, heavy backups, and restores must prioritize `DIRECT_URL` (typically port 5432) to bypass pgBouncer pooling and avoid session timeouts.
      3. Cross-Platform Runtimes: Ensure scripts are fully compatible with both Windows and Unix. For shell commands requiring credentials, verify password passing handles both environments cleanly (e.g. temporary secure `.pgpass` files inside temporary directories for Windows, PGPASSWORD for Unix).
      4. Security & Secrets: Never hardcode passwords or access tokens. In tests, evade false positives by splitting or dynamically generating mock strings (e.g., splitting 'PGPASSWORD' literals).
      5. Next.js Routing & Caching: Verify proper use of dynamic loading (`next/dynamic`) for complex components and correct cache headers in `next.config.ts`.

reviews:
  summary:
    enabled: true
  code_review:
    enabled: true
  chat:
    enabled: true

ignore:
  - "**/node_modules/**"
  - "**/dist/**"
  - "package-lock.json"
  - "pnpm-lock.yaml"
  - "backups/**"
