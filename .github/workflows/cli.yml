name: CLI CI

on:
  push:
    branches: [ "main" ]
    paths:
      - "cli/**"
  pull_request:
    branches: [ "main" ]
    paths:
      - "cli/**"

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - name: Setup pnpm
      uses: pnpm/action-setup@v4
      with:
        version: 9

    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'pnpm'

    - name: Install dependencies
      run: pnpm install
      working-directory: .

    - name: Run Lint
      working-directory: ./cli
      run: |
        if pnpm run lint --if-present; then
          echo "Linting passed or no lint script found"
        else
          echo "Linting failed"
          exit 1
        fi

    # - name: Run Tests
    #   run: npm test --if-present
