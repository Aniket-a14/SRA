name: Frontend CI

on:
  push:
    branches: [ "main" ]
    paths:
      - "frontend/**"
  pull_request:
    branches: [ "main" ]
    paths:
      - "frontend/**"

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - name: Use Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: package-lock.json

    - name: Install dependencies
      run: npm ci
      working-directory: .

    - name: Run Lint
      run: npm run lint
      working-directory: ./frontend

    - name: Type Check
      run: npx tsc --noEmit
      working-directory: ./frontend

    - name: Security Scan
      run: npm audit --audit-level=high || true
      working-directory: ./frontend

    - name: Run Build
      run: npm run build
      working-directory: ./frontend
