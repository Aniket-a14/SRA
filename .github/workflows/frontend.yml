name: Frontend CI

on:
  push:
    branches: [ "main" ]
    paths:
      - "frontend/**"
  pull_request:
    branches: [ "main" ]
    paths:
      - "frontend/**"

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - name: Setup pnpm
      uses: pnpm/action-setup@v4
      with:
        version: 9

    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'pnpm'

    - name: Install dependencies
      run: pnpm install
      working-directory: .

    - name: Run Lint
      run: pnpm --filter frontend run lint
      working-directory: ./frontend

    - name: Type Check
      run: npx tsc --noEmit
      working-directory: ./frontend

    - name: Security Scan
      run: pnpm audit --audit-level=high || true
      working-directory: ./frontend

    - name: Run Build
      run: pnpm --filter frontend run build
      working-directory: ./frontend
