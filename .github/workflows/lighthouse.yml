name: Lighthouse CI
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install
        working-directory: .

      - name: Build
        run: pnpm --filter frontend run build
        working-directory: ./frontend
        env:
          NEXT_PUBLIC_BACKEND_URL: "http://localhost:3000"

      - name: Serve app
        working-directory: ./frontend
        run: |
          pnpm add -g wait-on
          pnpm --filter frontend exec next start -p 3001 &
          wait-on http://localhost:3001 --timeout 60000

      - name: Static Analysis with Lighthouse
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: |
            http://localhost:3001/
          uploadArtifacts: true
          temporaryPublicStorage: true
          configPath: './frontend/.lighthouserc.json'
