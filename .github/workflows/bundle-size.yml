name: Bundle Size Check

on:
  push:
    branches: [ "main" ]
    paths:
      - "frontend/**"
  pull_request:
    branches: [ "main" ]
    paths:
      - "frontend/**"
  workflow_dispatch:

jobs:
  check-size:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install
        working-directory: .

      - name: Run Build
        run: pnpm --filter frontend run build
        working-directory: ./frontend

      - name: Analyze Bundle
        working-directory: ./frontend
        run: |
          echo "### Bundle Size Analysis" >> $GITHUB_STEP_SUMMARY
          ls -lh .next/static/chunks >> $GITHUB_STEP_SUMMARY
