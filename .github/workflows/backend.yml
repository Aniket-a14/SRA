name: Backend CI

on:
  push:
    branches: [ "main" ]
    paths:
      - "backend/**"
  pull_request:
    branches: [ "main" ]
    paths:
      - "backend/**"

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - name: Setup pnpm
      uses: pnpm/action-setup@v4
      with:
        version: 9

    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Get pnpm store directory
      id: pnpm-cache
      shell: bash
      run: |
        echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

    - uses: actions/cache@v4
      name: Setup pnpm cache
      with:
        path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
        key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
        restore-keys: |
          ${{ runner.os }}-pnpm-store-

    - name: Install dependencies
      run: pnpm install
      working-directory: .

    - name: Run Lint
      run: pnpm --filter backend run lint
      working-directory: ./backend

    - name: Security Scan
      # --prod scopes this to runtime dependencies (dev-only tooling like jest/eslint/prisma-cli
      # isn't shipped, so its advisories don't need to block a merge). No more `|| true` —
      # this step actually fails the build on a high-severity production CVE, with one narrow,
      # named exception: GHSA-3jxr-9vmj-r5cp (brace-expansion ReDoS) reaches this scan only via
      # nodemon -> minimatch, a devDependency never invoked in production (start script and
      # Dockerfile both run `node src/server.js` directly) and not yet fixed upstream by nodemon.
      run: |
        set +e
        AUDIT_JSON=$(pnpm audit --prod --audit-level=high --json)
        set -e
        echo "$AUDIT_JSON" | node -e '
          let data = "";
          process.stdin.on("data", d => data += d);
          process.stdin.on("end", () => {
            const j = JSON.parse(data || "{}");
            const accepted = new Set(["GHSA-3jxr-9vmj-r5cp"]);
            const advisories = Object.values(j.advisories || {});
            const remaining = advisories.filter(a => a.severity === "high" && !accepted.has(a.github_advisory_id));
            if (remaining.length > 0) {
              console.error("Unaccepted high-severity vulnerabilities found:");
              remaining.forEach(a => console.error(`- ${a.title} (${a.module_name})`));
              process.exit(1);
            }
            console.log("No unaccepted high-severity vulnerabilities.");
          });
        '
      working-directory: ./backend

    - name: Run Tests with Coverage
      run: pnpm --filter backend test -- --coverage
      working-directory: ./backend
      env:
        CI: true

    - name: Upload Coverage
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: backend/coverage
